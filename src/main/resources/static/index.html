<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일자리 매칭 에이전트</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header>
    <h1>🤖 일자리 매칭 에이전트</h1>
    <nav>
        <button class="tab-btn active" onclick="showTab('profile')">프로필</button>
        <button class="tab-btn" onclick="showTab('postings')">공고 목록</button>
        <button class="tab-btn" onclick="showTab('results')">분석 결과</button>
    </nav>
</header>

<main>
    <!-- 프로필 -->
    <section id="tab-profile" class="tab-content active">
        <div class="card">
            <h2>내 프로필</h2>
            <div class="form-group">
                <label>희망 직무</label>
                <input type="text" id="jobTitle">
            </div>
            <div class="form-group">
                <label>경력 요약</label>
                <textarea id="resumeContent" rows="4"></textarea>
            </div>
            <div class="form-group">
                <label>선호 카테고리</label>
                <input type="text" id="preferredCategories">
            </div>
            <div class="form-group">
                <label>기피 키워드</label>
                <input type="text" id="avoidKeywords">
            </div>
            <div class="form-row">
                <div class="form-group half">
                    <label>최소 연봉 (원)</label>
                    <input type="number" id="payFloor">
                </div>
                <div class="form-group half">
                    <label>목표 연봉 (원)</label>
                    <input type="number" id="payTarget">
                </div>
            </div>
            <div class="button-row">
                <button class="btn-primary" onclick="saveProfile()">프로필 저장</button>
                <button class="btn-secondary" onclick="runCrawl()">🔍 공고 수집</button>
                <button class="btn-secondary" onclick="runAnalyze()">🧠 AI 분석 실행</button>
            </div>
            <div id="action-status" class="status-msg"></div>
        </div>
    </section>

    <!-- 공고 목록 -->
    <section id="tab-postings" class="tab-content">
        <div class="card">
            <h2>수집된 공고 <span id="posting-count" class="badge"></span></h2>
            <table>
                <thead>
                <tr>
                    <th>회사</th>
                    <th>직무</th>
                    <th>수집일시</th>
                    <th>링크</th>
                </tr>
                </thead>
                <tbody id="postings-body"></tbody>
            </table>
        </div>
    </section>

    <!-- 분석 결과 -->
    <section id="tab-results" class="tab-content">
        <div class="card">
            <h2>AI 분석 결과 <span id="result-count" class="badge"></span></h2>
            <div id="results-list"></div>
        </div>
    </section>
</main>

<script src="/js/app.js"></script>
</body>
</html>
